name: Swift Tests

# CI Coverage:
# - swift test: all SPM unit tests (current baseline: 586)
# - xcodebuild build: compiles the iOS app wrapper and embedded widget extension
# - dedicated wrapper/.github/workflows/xcode-test.yml: runs xcodebuild test on iOS Simulator
# - Widget UI itself is not directly testable in CI (requires WidgetKit runtime / hardware)
# - Live Activity: not testable in CI (requires ActivityKit + hardware)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: swift test

      - name: Build iOS wrapper and embedded widget
        run: |
          xcodebuild build \
            -project wrapper/LH2GPXWrapper.xcodeproj \
            -scheme LH2GPXWrapper \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO

      - name: Lint
        run: |
          if ! command -v swiftlint &>/dev/null; then
            brew install swiftlint
          fi
          swiftlint lint
