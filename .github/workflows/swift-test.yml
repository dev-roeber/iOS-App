name: Swift Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: swift test

      - name: Lint
        run: |
          if ! command -v swiftlint &>/dev/null; then
            brew install swiftlint
          fi
          swiftlint lint
