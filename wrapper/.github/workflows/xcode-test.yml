name: Xcode Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # In the monorepo the Core Swift Package lives at the repo root.
      # The Xcode project at wrapper/LH2GPXWrapper.xcodeproj references it
      # via relativePath = ".." (one level up from wrapper/, i.e. the repo root).
      # No separate clone of the Core package is needed.

      - name: Run Tests
        run: |
          # The LH2GPXWidget extension is embedded in the LH2GPXWrapper scheme.
          # This simulator test run therefore also compiles the widget target.
          xcodebuild test \
            -project wrapper/LH2GPXWrapper.xcodeproj \
            -scheme LH2GPXWrapper \
            -destination 'platform=iOS Simulator,OS=latest,name=iPhone 17'
